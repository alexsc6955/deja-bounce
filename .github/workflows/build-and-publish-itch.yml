name: Publish Deja Bounce to itch.io

on:
  push:
    tags:
      - "deja-bounce-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. deja-bounce-v1.6.0)"
        required: true
        type: string
      channel:
        description: "itch.io channel"
        required: false
        type: string
        default: "windows"

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: windows-latest

    env:
      PYTHON_VERSION: "3.9"
      GAME_NAME: "DejaBounce"
      BUILD_DIR: "dist"

    steps:
      - name: Resolve tag and version
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
        run: |
          set -e

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi

          if [[ ! "$tag" =~ ^deja-bounce-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $tag"
            exit 1
          fi

          version="${tag#deja-bounce-v}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Checkout tagged release
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Guard imports
        run: |
          python -c "import deja_bounce.scenes; print('OK: scenes importable')"

      - name: Build Windows EXE with PyInstaller
        run: pyinstaller --onedir --name "$env:GAME_NAME" --paths "src" --collect-submodules deja_bounce.scenes --collect-submodules mini_arcade_native_backend --collect-binaries mini_arcade_native_backend --copy-metadata mini-arcade-core --copy-metadata deja-bounce --add-data "assets;assets" --add-binary "native_dlls\SDL2.dll;." --add-binary "native_dlls\SDL2_ttf.dll;." src\deja_bounce\__main__.py

      - name: Package build as ZIP
        run: |
          $version = "${{ steps.release.outputs.version }}"
          $zipName = "$($env:GAME_NAME)-v$version-windows.zip"

          if (Test-Path package) { Remove-Item package -Recurse -Force }
          New-Item -ItemType Directory -Path package | Out-Null

          Copy-Item "$env:BUILD_DIR\$env:GAME_NAME\*" "package\" -Recurse

          if (Test-Path README.md) { Copy-Item README.md package\ }
          if (Test-Path LICENSE) { Copy-Item LICENSE package\ }

          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "package\*" -DestinationPath $zipName

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-windows
          path: "${{ env.GAME_NAME }}-v${{ steps.release.outputs.version }}-windows.zip"

      - name: Download butler
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://broth.itch.zone/butler/windows-amd64/LATEST/archive/default" -OutFile "butler.zip"
          Expand-Archive -Path "butler.zip" -DestinationPath "." -Force

      - name: Publish to itch.io with butler
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_IO_API_KEY }}
          CHANNEL_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'windows' }}
        shell: pwsh
        run: |
          $channel = "$env:CHANNEL_INPUT"
          if (-not $channel) { $channel = "windows" }

          $version = "${{ steps.release.outputs.version }}"
          $zipName = "DejaBounce-v$version-windows.zip"

          .\butler.exe push `
            "$zipName" `
            "rincorpes/dejabounce:$channel" `
            --userversion "v$version"
